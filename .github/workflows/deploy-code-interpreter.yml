name: Deploy Code Interpreter to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'code-interpreter/**'
      - '.github/workflows/deploy-code-interpreter.yml'

env:
  PROJECT_ID: kopern
  REGION: europe-west1
  SERVICE_NAME: code-interpreter
  # Artifact Registry repo (create once: gcloud artifacts repositories create kopern-docker --repository-format=docker --location=europe-west1)
  AR_REPO: europe-west1-docker.pkg.dev/kopern/kopern-docker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate via Workload Identity Federation (no service account key needed)
      # Setup: https://github.com/google-github-actions/auth#workload-identity-federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest \
            code-interpreter/

      - name: Push Docker image
        run: |
          docker push ${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300s \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 10 \
            --no-allow-unauthenticated \
            --set-env-vars "CODE_INTERPRETER_SECRET=${{ secrets.CODE_INTERPRETER_SECRET }}" \
            --project ${{ env.PROJECT_ID }}

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Deployed to: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT
